<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라틴소울 수강료 계산기 3.0</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
--bg:#120a14; --card:#1e1320; --card2:#271828; --line:#3a2740;
--txt:#f3eef5; --sub:#a99fb0; --accent:#ff5a3c; --accent2:#ff8a3c;
--ok:#37d67a; --chip:#2c1d30; --chipon:#ff5a3c;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;}
body{background:var(--bg);color:var(--txt);line-height:1.5;}
.header{background:linear-gradient(160deg,#2a0f2e 0%,#3a1230 45%,#1a0a1c 100%);
padding:32px 16px 28px;text-align:center;border-bottom:1px solid var(--line);}
.header h1{font-size:30px;font-weight:800;}
.header h1 b{color:var(--accent);}
.header p{color:var(--sub);font-size:14px;margin-top:6px;}
.sync{display:inline-block;margin-top:10px;font-size:12px;color:var(--ok);
background:rgba(55,214,122,.12);padding:4px 12px;border-radius:20px;}
.sync.fail{color:#ff7676;background:rgba(255,118,118,.12);}
.wrap{max-width:560px;margin:0 auto;padding:24px 16px 80px;}
label.lbl{display:block;font-size:14px;font-weight:700;margin:18px 0 8px;}
input[type=text]{width:100%;padding:14px;border-radius:10px;border:1px solid var(--line);
background:var(--card);color:var(--txt);font-size:15px;}
input[type=text]::placeholder{color:#6b5f72;}
.subj{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
.badge{display:inline-block;background:var(--accent);color:#fff;font-weight:700;font-size:13px;
padding:4px 12px;border-radius:8px;margin-bottom:12px;}
.row2{display:flex;gap:10px;}
.row2 select{flex:1;padding:13px;border-radius:10px;border:1px solid var(--line);
background:var(--card2);color:var(--txt);font-size:14px;}
.price{font-size:22px;font-weight:800;margin-top:12px;}
.global-opts{display:flex;flex-direction:column;gap:10px;margin:8px 0 4px;}
.opt{display:flex;align-items:center;justify-content:space-between;
background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;}
.opt.on{border-color:var(--accent);background:var(--card2);}
.opt .t{font-size:14px;font-weight:700;}
.opt .d{font-size:12px;color:var(--sub);margin-top:2px;}
.opt .sw{width:44px;height:26px;border-radius:20px;background:#3a2740;position:relative;flex:0 0 auto;transition:.2s;}
.opt.on .sw{background:var(--accent);}
.opt .sw::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;}
.opt.on .sw::after{left:21px;}
.note{font-size:12px;color:var(--accent2);background:rgba(255,138,60,.1);
border-radius:10px;padding:10px 12px;margin-top:10px;}
.summary{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:18px;}
.summary h3{font-size:16px;margin-bottom:14px;}
.sline{display:flex;justify-content:space-between;font-size:14px;color:var(--sub);margin:7px 0;}
.sline span:last-child{color:var(--txt);font-weight:600;}
.sline.disc span:last-child{color:var(--ok);}
.hr{height:1px;background:var(--line);margin:14px 0;}
.total{display:flex;justify-content:space-between;align-items:center;}
.total .lab{font-size:17px;font-weight:800;}
.total .val{font-size:28px;font-weight:800;color:var(--accent);}
.btns{display:flex;gap:10px;margin-top:18px;}
.btns button{flex:1;padding:15px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-save{background:var(--accent);color:#fff;}
.btn-reset{background:var(--card2);color:var(--sub);border:1px solid var(--line)!important;}
.warn{color:#ff7676;font-size:12px;margin-top:8px;}
.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
align-items:center;justify-content:center;z-index:99;gap:16px;}
.spin{width:46px;height:46px;border:4px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;color:#fff;
padding:12px 22px;border-radius:30px;font-size:14px;opacity:0;transition:.3s;z-index:100;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="loading" id="loading"><div class="spin"></div><div id="loadtxt">어드민 설정 불러오는 중...</div></div>
<div class="header">
<h1><b>수강료</b> 계산기 <span style="font-size:18px;color:var(--accent2)">3.0</span></h1>
<p>라틴소울 · 살사 & 바차타 20차수 수강료 자동 계산 & 기록</p>
<span class="sync" id="sync">동기화 중...</span>
</div>
<div class="wrap">
<label class="lbl">닉네임</label>
<input type="text" id="nickname" placeholder="닉네임을 입력하세요">
<label class="lbl">과목 선택</label>
<div id="subjects"></div>
<label class="lbl">공통 할인 / 이벤트</label>
<div class="global-opts" id="globalOpts"></div>
<div class="summary">
<h3>계산 내역</h3>
<div id="breakdown"></div>
<div class="hr"></div>
<div class="total"><span class="lab">최종 합계</span><span class="val" id="grandTotal">0원</span></div>
<div id="conflictWarn" class="warn"></div>
</div>
<div class="btns">
<button class="btn-save" id="saveBtn">기록 저장</button>
<button class="btn-reset" id="resetBtn">초기화</button>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzMB8ltV5JAla8neDIxgWPK-6tw7ViDpxbbzU2QEvcuPsc9yFF-F_flhavAqCy2w4nfPQ/exec";
const NUM_SUBJECTS = 3;
let CONFIG = null;
const state = {
subjects: Array.from({length:NUM_SUBJECTS}, () => ({genre:'', cls:''})),
pre:false, event:false, female11:false
};
const fmt = n => (n||0).toLocaleString('ko-KR') + '원';

/* ---------- 어드민 설정 로드 (JSONP) ---------- */
function loadConfig(){
return new Promise((resolve,reject)=>{
const cbName = 'cb_' + Date.now();
window[cbName] = (data)=>{ delete window[cbName]; s.remove(); resolve(data); };
const s = document.createElement('script');
s.src = WEBAPP_URL + '?callback=' + cbName + '&t=' + Date.now();
s.onerror = ()=>{ s.remove(); reject(new Error('network')); };
document.body.appendChild(s);
setTimeout(()=>{ if(window[cbName]){ delete window[cbName]; reject(new Error('timeout')); } }, 12000);
});
}
function genres(){ return [...new Set(CONFIG.classes.map(c=>c.genre))]; }
function classesOf(g){ return CONFIG.classes.filter(c=>c.genre===g); }
function findClass(g,n){ return CONFIG.classes.find(c=>c.genre===g && c.name===n); }
function preActive(){
if(!CONFIG.settings.preDeadline) return false;
const today = new Date(); today.setHours(0,0,0,0);
const dl = new Date(CONFIG.settings.preDeadline + 'T23:59:59');
return today <= dl;
}

/* ---------- 비기너(살사/바차타 비기너·입문반) 판별 ---------- */
function isBeginner(cl){
if(!cl) return false;
const n = cl.name || '';
return (cl.genre==='살사' || cl.genre==='바차타') && (n.includes('비기너') || n.includes('입문'));
}

/* ---------- 시간 겹침 체크 ---------- */
function toMin(t){ const m=t.match(/(\d{1,2}):(\d{2})/); return m? +m[1]*60 + +m[2] : null; }
function timeRange(time){
const m = (time||'').match(/(\d{1,2}:\d{2})\s*[-~]\s*(\d{1,2}:\d{2})/);
return m ? [toMin(m[1]), toMin(m[2])] : null;
}
function conflicts(){
const chosen = state.subjects.map(s=> s.genre&&s.cls ? findClass(s.genre,s.cls) : null).filter(Boolean);
const out=[];
for(let i=0;i<chosen.length;i++) for(let j=i+1;j<chosen.length;j++){
const a=timeRange(chosen[i].time), b=timeRange(chosen[j].time);
if(a&&b && a[0]<b[1] && b[0]<a[1]) out.push(chosen[i].name+' ↔ '+chosen[j].name);
}
return out;
}

/* ---------- UI 렌더 ---------- */
function renderSubjects(){
const box = document.getElementById('subjects');
box.innerHTML = '';
state.subjects.forEach((sub,i)=>{
const div = document.createElement('div');
div.className = 'subj';
const gOpts = ['<option value="">장르 선택</option>'].concat(genres().map(g=>`<option ${sub.genre===g?'selected':''}>${g}</option>`)).join('');
const cOpts = ['<option value="">클래스 선택</option>'].concat(
sub.genre ? classesOf(sub.genre).map(c=>{
const tr = timeRange(c.time);
const clash = state.subjects.some((os,oi)=>{
if(oi===i || !os.genre || !os.cls) return false;
const ocl = findClass(os.genre, os.cls);
if(!ocl) return false;
const otr = timeRange(ocl.time);
return tr && otr && tr[0]<otr[1] && otr[0]<tr[1];
});
const sel = sub.cls===c.name ? 'selected' : '';
const dis = (clash && sub.cls!==c.name) ? 'disabled' : '';
const mark = dis ? ' (시간겹침)' : '';
return `<option value="${c.name}" ${sel} ${dis}>${c.name} (${fmt(c.fee)}) · ${c.time}${mark}</option>`;
}).join('') : []
).join('');
const cl = sub.genre&&sub.cls ? findClass(sub.genre,sub.cls) : null;
const price = cl ? subjectNet(cl) : 0;
div.innerHTML = `
<span class="badge">과목 ${i+1}</span>
<div class="row2">
<select data-i="${i}" data-k="genre">${gOpts}</select>
<select data-i="${i}" data-k="cls">${cOpts}</select>
</div>
<div class="price">${fmt(price)}</div>`;
box.appendChild(div);
});
box.querySelectorAll('select').forEach(sel=>sel.addEventListener('change',e=>{
const i=+e.target.dataset.i, k=e.target.dataset.k;
state.subjects[i][k]=e.target.value;
if(k==='genre') state.subjects[i].cls='';
render();
}));
}

function renderGlobal(beginnerActive){
const pre = preActive();
const box = document.getElementById('globalOpts');
let html = '';

// 사전신청 할인
const preDis = !pre;
html += `<div class="opt ${state.pre&&pre?'on':''}" data-k="pre" ${preDis?'style="opacity:.4;pointer-events:none"':''}>
<div><div class="t">사전신청 할인 (과목당 1만원)</div>
<div class="d">${pre ? `~${CONFIG.settings.preDeadline}까지 · 패키지 할인과는 중복 불가, 비기너 1+1과는 중복 가능` : '적용 기간 종료'}</div></div><div class="sw"></div></div>`;

// 개편이벤트 (비기너 1+1 적용 중이면 자동 차단)
const evtDis = beginnerActive;
html += `<div class="opt ${state.event&&!evtDis?'on':''}" data-k="event" ${evtDis?'style="opacity:.4;pointer-events:none"':''}>
<div><div class="t">개편이벤트 (인당 ${fmt(CONFIG.settings.eventAmount)})</div>
<div class="d">${evtDis ? '비기너 1+1 적용 중 · 개편이벤트 중복 불가' : '카페가입인사·자소서·수업신청글 작성자 · 비기너 1+1과는 중복 불가, 패키지와는 중복 가능'}</div></div><div class="sw"></div></div>`;

// 여성 비기너 1+1 (기존 기능 유지, 이벤트만 차단)
html += `<div class="opt ${state.female11?'on':''}" data-k="female11">
<div><div class="t">여성 비기너 1+1</div>
<div class="d">여성이 여성회원 동반 시 비기너 1명 무료 · 사전 가능, 이벤트 불가</div></div><div class="sw"></div></div>`;

// 비기너 1+1 자동 안내 (읽기 전용)
html += `<div class="opt" style="cursor:default;pointer-events:none">
<div><div class="t">비기너 1+1 (자동 적용)</div>
<div class="d">살사 비기너 + 바차타 비기너 동시 신청 시 1+1(1과목 무료) · 사전 가능, 이벤트 불가</div></div></div>`;

// 패키지 안내 (읽기 전용)
html += `<div class="opt" style="cursor:default;pointer-events:none">
<div><div class="t">패키지 할인 (자동 적용)</div>
<div class="d">올레벨·어드밴스·공연준비반 조합 시 자동 적용 · 사전할인과는 중복 불가, 개편이벤트와는 중복 가능</div></div></div>`;

box.innerHTML = html;

box.querySelectorAll('.opt[data-k]').forEach(o=>o.addEventListener('click',()=>{
const k=o.dataset.k;
state[k]=!state[k];
render();
}));
}

/* ---------- 과목 단가(표시용): 사전 차감 ---------- */
function subjectNet(cl){
if(!cl) return 0;
let net = cl.fee;
if(state.pre && preActive() && cl.preDiscount>0) net -= cl.preDiscount;
return net;
}

/* ---------- 패키지 자동 감지 (매칭 중 1개만 적용) ---------- */
function detectPackages(chosenKeys){
const have = (g,n)=> chosenKeys.some(k=>k.genre===g && k.cls===n);
const priority = (p)=> p.need.some(([g,n])=> n==='공연준비반') ? 2 : 1;
const matched = CONFIG.packages.filter(p => p.need.every(([g,n])=>have(g,n)));
if(!matched.length) return {total:0, labels:[], usedKeys:[]};
let best = matched[0];
for(const p of matched){
if( priority(p) > priority(best)
    || (priority(p) === priority(best) && p.discount > best.discount) ){
best = p;
}
}
const usedKeys = best.need.map(([g,n])=>({genre:g, cls:n}));
return {total: best.discount, labels:[best.label], usedKeys};
}

/* ---------- 전체 계산 ---------- */
function calc(){
const chosen = state.subjects.map(s=>{
const cl = s.genre&&s.cls ? findClass(s.genre,s.cls) : null;
return cl ? {sub:s, cl} : null;
}).filter(Boolean);

// 비기너 1+1 무료 대상 결정
// 1) 살사 비기너 + 바차타 비기너 동시 신청 → 자동 1+1
// 2) 아니면 '여성 비기너 1+1' 토글 → 비기너 중 최저가 무료 (기존 기능)
const chosenBegs = chosen.filter(({cl})=> isBeginner(cl));
const hasSalsaBeg   = chosenBegs.some(({cl})=> cl.genre==='살사');
const hasBachataBeg = chosenBegs.some(({cl})=> cl.genre==='바차타');
let freedCl=null, beginnerLabel='';
if(hasSalsaBeg && hasBachataBeg){
freedCl = chosenBegs.map(({cl})=>cl).sort((a,b)=>a.fee-b.fee)[0];
beginnerLabel = '비기너 1+1 (살사+바차타)';
}else if(state.female11){
const f11 = (CONFIG.settings.female11Classes||[]);
const cands = chosen.filter(({cl})=> f11.includes(cl.name)).map(({cl})=>cl).sort((a,b)=>a.fee-b.fee);
if(cands.length){ freedCl=cands[0]; beginnerLabel='여성 비기너 1+1'; }
}
const beginnerActive = !!freedCl;
const beginnerOff = freedCl ? freedCl.fee : 0;

// 과목 합산 + 사전할인 (무료 대상 비기너는 사전할인 제외)
let subtotal=0, preTotal=0;
chosen.forEach(({cl})=>{
subtotal += cl.fee;
if(cl===freedCl) return; // 무료 과목엔 사전할인 미적용
if(state.pre && preActive() && cl.preDiscount>0) preTotal += cl.preDiscount;
});

// 개편이벤트: 비기너 1+1 적용 중이면 차단
const eventOff = (state.event && !beginnerActive) ? CONFIG.settings.eventAmount : 0;

// 패키지 (사전할인과 중복 불가 / 개편이벤트와는 중복 가능)
const keys = chosen.map(({sub})=>({genre:sub.genre, cls:sub.cls}));
const pkg = detectPackages(keys);
let pkgOff = pkg.total;
let pkgLabels = pkg.labels.slice();

// 패키지에 사용된 과목만 사전할인에서 제외
if(pkgOff > 0 && preTotal > 0){
chosen.forEach(({sub, cl})=>{
const inPkg = pkg.usedKeys.some(k => k.genre===sub.genre && k.cls===cl.name);
if(inPkg && cl!==freedCl && state.pre && preActive() && cl.preDiscount>0){
preTotal -= cl.preDiscount;
}
});
if(preTotal < 0) preTotal = 0;
}

const total = Math.max(0, subtotal - preTotal - eventOff - beginnerOff - pkgOff);
return {chosen, subtotal, preTotal, eventOff, beginnerOff, beginnerLabel, beginnerActive, pkgOff, pkgLabels, total};
}

/* ---------- 렌더 ---------- */
function render(){
const r = calc();
renderSubjects();
renderGlobal(r.beginnerActive);

const lines=[];
lines.push(`<div class="sline"><span>과목 합산</span><span>${fmt(r.subtotal)}</span></div>`);
if(r.preTotal) lines.push(`<div class="sline disc"><span>사전신청 할인</span><span>-${fmt(r.preTotal)}</span></div>`);
if(r.eventOff) lines.push(`<div class="sline disc"><span>개편이벤트</span><span>-${fmt(r.eventOff)}</span></div>`);
if(r.beginnerOff) lines.push(`<div class="sline disc"><span>${r.beginnerLabel}</span><span>-${fmt(r.beginnerOff)}</span></div>`);
if(r.pkgOff) lines.push(`<div class="sline disc"><span>패키지 할인</span><span>-${fmt(r.pkgOff)}</span></div>`);
document.getElementById('breakdown').innerHTML = lines.join('');
document.getElementById('grandTotal').textContent = fmt(r.total);

const notes=[];
if(r.beginnerActive) notes.push(`✓ ${r.beginnerLabel} 적용됨 · 사전할인은 적용되지만 개편이벤트와는 중복되지 않습니다.`);
if(r.pkgLabels.length) notes.push(`✓ ${r.pkgLabels.join(', ')} 적용됨 · 패키지 할인은 사전할인과 중복되지 않습니다.`);
if(notes.length) document.getElementById('breakdown').insertAdjacentHTML('beforeend',
notes.map(n=>`<div class="note">${n}</div>`).join(''));

const cf = conflicts();
document.getElementById('conflictWarn').textContent = cf.length ? '⚠ 수업시간이 겹칩니다: '+cf.join(', ') : '';
}

/* ---------- 저장 ---------- */
function save(){
const nick = document.getElementById('nickname').value.trim();
if(!nick){ toast('닉네임을 입력해주세요'); return; }
const r = calc();
if(!r.chosen.length){ toast('과목을 선택해주세요'); return; }
const items = r.chosen.map(({sub,cl})=>`${sub.genre} ${cl.name}`).join(', ');
const discs=[];
if(r.preTotal)discs.push('사전');
if(r.eventOff)discs.push('개편이벤트');
if(r.beginnerOff)discs.push('비기너1+1');
if(r.pkgLabels.length)discs.push('패키지');
const payload = {nickname:nick, items, discounts:discs.join('/'), subtotal:r.subtotal, total:r.total};
fetch(WEBAPP_URL, {method:'POST', mode:'no-cors',
headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload)})
.then(()=>toast('✓ 기록이 저장되었습니다'))
.catch(()=>toast('저장 요청을 보냈습니다'));
}

function toast(msg){
const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2200);
}

function reset(){
state.subjects = Array.from({length:NUM_SUBJECTS},()=>({genre:'',cls:''}));
state.pre=false; state.event=false; state.female11=false;
document.getElementById('nickname').value='';
render();
}

/* ---------- 초기화 ---------- */
async function init(){
try{
const res = await loadConfig();
if(!res || !res.ok) throw new Error(res && res.error || 'no data');
CONFIG = res.config;
const sync = document.getElementById('sync');
sync.textContent = '✓ 어드민 동기화 ('+ new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) +')';
sync.classList.remove('fail');
render();
}catch(e){
